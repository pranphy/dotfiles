# home
monitor=DP-2,highres,0x0,1
monitor=eDP-1,highres,1920x0,1

# stream
#monitor=DP-7,1920x1080@60,0x0,1
#monitor=eDP-1,highres,0x1080,1
# tv
#monitor=DP-7,1920x1080@60,0x0,1
#monitor=DP-8,3840x2160@60,1920x0,1
#monitor=eDP-1,highres,1920x0,1,mirror,DP-8

# work
#monitor=DP-1,highres,0x0,1
#monitor=DP-2,highres,3840x0,1
#monitor=eDP-1,highres,7680x0,1

#monitor=DP-2,highres,0x0,1
#monitor=eDP-1,highres,3840x0,1

env = GTK_THEME,Sweet-Dark 
#env = __NV_PRIME_RENDER_OFFLOAD,1
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia

$terminal = kitty
$fileManager = kitty -e yazi
$menu = dmenu-wl_run -i

exec-once = fcitx5 -d

exec-once = dunst
exec-once = hypridle
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

general {
    gaps_in = 0
    gaps_out = 0

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

   # drop_shadow = false
   # shadow_range = 4
   # shadow_render_power = 3
   # col.shadow = rgba(1a1a1aee)

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0  # Set to 0 or 1 to disable the anime mascot wallpapers -1 for background
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    gesture = 3, horizontal, workspace
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Ignore maximize requests
#windowrule = match:class .*, suppressevent maximize

# XWayland drag/focus quirks
#windowrule = match:class ^$, match:title ^$, nofocus 1, xwayland 1, float 1, fullscreen 0, pinned 0

# Generic floating dialogs
windowrule = match:class file_progress, float 1
windowrule = match:class confirm, float 1
windowrule = match:class dialog, float 1
windowrule = match:class download, float 1
windowrule = match:class notification, float 1
windowrule = match:class error, float 1
windowrule = match:class splash, float 1
windowrule = match:class confirmreset, float 1

# ManimGL is called ModernGL
windowrule = match:class ModernGL, float 1

# Title-based floating
windowrule = match:title ^(Picture-in-Picture)$, float 1
windowrule = match:title ^(Open file)$, float 1
windowrule = match:title branchdialog, float 1

# Specific apps
windowrule = match:class Lxappearance, float 1
windowrule = match:title wlogout, float 1, fullscreen 1

# Idle inhibit
#windowrule = match:class mpv, idleinhibit focus
#windowrule = match:class firefox, idleinhibit fullscreen

# Media viewer
windowrule = match:title ^(Media viewer)$, float 1

# Volume control
windowrule = match:title ^(Volume Control)$, float 1, size 800 600, move 75 44%

# Firefox PiP
windowrule = match:class firefox, match:title ^(Picture-in-Picture)$, float 1

# Misc floaters
windowrule = match:class ^(davmail-DavGateway)$, float 1
windowrule = match:class ^(gksqt)$, float 1
windowrule = match:class ^(swayimg)$, float 1
windowrule = match:class ^(com.saivert.pwvucontrol)$, float 1
windowrule = match:class ^(zenity)$, float 1
windowrule = match:class ^(GoldenDict-ng)$, float 1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, W, killactive, 
#bind = $mainMod, Q, exit, 
bind = $mainMod ALT, Q, exec, ~/.local/bin/killhypr
bind = $mainMod, S, togglefloating, 
bind = $mainMod, G, pseudo, # dwindle
bind = $mainMod, V, togglesplit, # dwindle
bind = $mainMod, F,fullscreen
bind = $mainMod, T,fullscreen
bind = $mainMod, 34, workspace, r-1 # 34 is [
bind = $mainMod, 35, workspace, r+1 # 35 is ]

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, right, movetoworkspace, r+1
bind = $mainMod SHIFT, left, movetoworkspace, r-1
bind = ALT SHIFT, L, movetoworkspace, r+1
bind = ALT SHIFT, H, movetoworkspace, r-1

# Example special workspace (scratchpad)
bind = $mainMod, P, togglespecialworkspace, magic
bind = $mainMod SHIFT, P, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SHIFT, mouse:272, movewindow
bindm = SHIFT, mouse:273, resizewindow

bind = $mainMod SHIFT, l, resizeactive, 20 0
bind = $mainMod SHIFT, h, resizeactive, -20 0
bind = $mainMod SHIFT, k, resizeactive, 0 -20
bind = $mainMod SHIFT, j, resizeactive, 0 20

bind = $mainMod ALT SHIFT, l, movewindow, r 
bind = $mainMod ALT SHIFT, h, movewindow, l
bind = $mainMod ALT SHIFT, k, movewindow, u
bind = $mainMod ALT SHIFT, j, movewindow, d

# apps
bind = ALT SHIFT, P, exec, passmenu
bind = ALT SHIFT, O, exec, otpmenu
bind = $mainMod, N, exec, neovide
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, cosmic-term
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu
bind = CTRL, G, exec, goldendict "$(wl-paste -n -p)"


# volume stuffs
bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@  toggle
bind = ,XF86MonBrightnessUp, exec, brightnessctl set 10%+
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-

bind =,Print,exec,grim -g "$(slurp)" ~/Pictures/Screenshots/grim/$(date +%Y)/$(date +'%Y%m%d%H%M%S.png') && notify-send 'Screenshot Saved'
bind = SHIFT,Print,exec,grim -g "$(slurp)" - | wl-copy && notify-send 'Screenshot Copied'

bind = $mainMod, B, exec, notify-send "$(date +\%H:\%M) <> $(cat /sys/class/power_supply/BAT0/capacity) $(cat /sys/class/power_supply/BAT0/status)" 
bind = $mainMod ALT, L, exec, systemctl suspend

binds = SUPER_L&SHIFT_L, F&N, exec, firefox -p nt
binds = SUPER_L&SHIFT_L, F&D, exec, firefox -p default

# vim: ft=hyprlang
